name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  # ==========================================
  # Job 1: Code Quality & Type Check
  # ==========================================
  code-quality:
    name: Code Quality & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint || true

      - name: TypeScript type check
        run: npm run typecheck || true

  # ==========================================
  # Job 2: Unit Tests
  # ==========================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm run test:unit
        continue-on-error: true

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ==========================================
  # Job 3: Security Audit
  # ==========================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high || true

      - name: Security checks
        run: |
          echo "=== Security Checks ==="

          # Check for console.log in production code
          if grep -r "console\.log" src/ --include="*.ts" | grep -v "test\|spec"; then
            echo "Warning: console.log found in source code"
          fi

          # Check for Web Crypto API usage
          if grep -r "crypto\.subtle\|window\.crypto" src/ --include="*.ts"; then
            echo "✓ Web Crypto API usage found"
          fi

          # Check for PBKDF2
          if grep -r "PBKDF2" src/ --include="*.ts"; then
            echo "✓ PBKDF2 key derivation found"
          fi

          # Check for AES-GCM
          if grep -r "AES-GCM" src/ --include="*.ts"; then
            echo "✓ AES-GCM encryption found"
          fi

  # ==========================================
  # Job 4: Build
  # ==========================================
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        continue-on-error: true

      - name: Verify build output
        run: |
          echo "=== Build Verification ==="
          if [ -d "dist" ]; then
            echo "✓ dist/ directory created"
            ls -la dist/
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ==========================================
  # Job 5: E2E Tests
  # ==========================================
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: false  # Enable when Playwright browsers are installed

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E Tests
        run: npm run test:e2e
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ==========================================
  # Job 6: PWA Audit
  # ==========================================
  pwa-audit:
    name: PWA Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check PWA requirements
        run: |
          echo "=== PWA Audit ==="

          # Check manifest
          if [ -f "manifest.json" ]; then
            echo "✓ manifest.json exists"
            cat manifest.json | head -20
          fi

          # Check service worker
          if [ -f "sw.js" ]; then
            echo "✓ Service Worker exists"
          fi

          # Check icons
          if [ -d "assets/icons" ]; then
            echo "✓ Icons directory exists"
          fi

  # ==========================================
  # Job 7: Accessibility Check
  # ==========================================
  accessibility:
    name: Accessibility Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check accessibility features
        run: |
          echo "=== Accessibility Checks ==="

          # Check for lang attribute
          if grep -q 'lang="fa"' index.html || grep -q 'lang="en"' index.html; then
            echo "✓ Lang attribute found"
          fi

          # Check for ARIA attributes
          ARIA_COUNT=$(grep -o 'aria-' index.html | wc -l)
          echo "Found $ARIA_COUNT ARIA attributes"

          # Check for semantic HTML
          for tag in main nav header footer section aside; do
            if grep -q "<$tag" index.html; then
              echo "✓ <$tag> tag found"
            fi
          done

  # ==========================================
  # Job 8: Deploy Preview
  # ==========================================
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Preview URL
        run: |
          echo "Preview deployed to: ${{ steps.deployment.outputs.page_url }}"

  # ==========================================
  # Job 9: Deploy Production
  # ==========================================
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment URL
        run: |
          echo "Production deployed to: ${{ steps.deployment.outputs.page_url }}"

  # ==========================================
  # Job 10: Final Status
  # ==========================================
  success:
    name: ✅ All Checks Passed
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests, security, build, pwa-audit, accessibility]
    if: always()

    steps:
      - name: Check all jobs status
        run: |
          echo "====================================="
          echo "    CI/CD Pipeline Complete ✅        "
          echo "====================================="
          echo ""
          echo "✓ Code Quality & Type Check: ${{ needs.code-quality.result }}"
          echo "✓ Unit Tests: ${{ needs.unit-tests.result }}"
          echo "✓ Security Audit: ${{ needs.security.result }}"
          echo "✓ Build: ${{ needs.build.result }}"
          echo "✓ PWA Audit: ${{ needs.pwa-audit.result }}"
          echo "✓ Accessibility: ${{ needs.accessibility.result }}"
          echo ""
          if [[ "${{ needs.code-quality.result }}" == "success" ]] && \
             [[ "${{ needs.build.result }}" == "success" ]]; then
            echo "🎉 Ready to deploy!"
          fi
